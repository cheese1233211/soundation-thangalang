<!DOCTYPE html>
<html>
<head>
  <title>My Music Hub</title>
  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial;
      margin: 20px;
    }

    h1 {
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1a1a1a;
      padding: 10px;
      border-radius: 12px;
    }

    iframe {
      width: 100%;
      height: 150px;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h1>🎧 My Soundation Hub</h1>

<h2>🔥 Featured</h2>
<div class="grid">
  <div class="card">
    <iframe src="PUT_EMBED_LINK_HERE"></iframe>
    <p>Song Title</p>
  </div>
</div>

<h2>📈 Weekly Picks</h2>
<div class="grid">
  <div class="card">
    <iframe src="PUT_EMBED_LINK_HERE"></iframe>
    <p>Another Song</p>
  </div>
</div>

</body>
</html>
